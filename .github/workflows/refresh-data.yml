name: Refresh prediction data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-prediction-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh and validate model inputs
        run: python scripts/update_data.py --refresh-source-csvs

      - name: Publish refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed data/raw/historical_results.csv data/raw/goalscorers.csv data/raw/fifa_match_report_hub.html
          if git diff --cached --quiet; then
            echo "No data changes to publish."
            exit 0
          fi
          git commit -m "Refresh prediction data"
          git push
